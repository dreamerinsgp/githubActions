# 手动部署：先跑测试，通过后才部署到 Railway
# 需配置 RAILWAY_TOKEN，并关闭 Railway 的自动 Git 部署
name: Deploy (Test → Railway)

on:
  workflow_dispatch:     # 仅手动触发，不随 push 自动执行

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: jmeter_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Go API
        run: go build -o app .

      - name: Start Go API
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASS: root
          MYSQL_DB: jmeter_test
        run: |
          ./app &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health > /dev/null; then
              echo "Go API is ready"
              exit 0
            fi
            echo "Waiting for Go API... $i/30"
            sleep 2
          done
          echo "::error::Go API failed to start within 60s"
          exit 1

      - name: Compile & Run smoke tests
        working-directory: minijunit-java
        run: |
          mkdir -p target/classes target/test-classes
          javac -d target/classes src/main/java/minijunit/*.java
          javac -d target/test-classes -cp target/classes \
            src/test/java/minijunit/*.java \
            src/test/java/minijunit/api/*.java
          java -cp "target/classes:target/test-classes" minijunit.api.GoApiTest

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: railway up --detach
